// proto/user.proto
syntax = "proto3";
package user;

service UserService {
  rpc FindOne (UserById) returns (User);
  rpc FindAll (Empty) returns (UserList);
}

message UserById { string id = 1; }

message Empty {}

message User {
  string id        = 1;
  string firstName = 2;
  string lastName  = 3;
  string email     = 4;
  string phone     = 5;
  string role      = 6;
  bool   isActive  = 7;
  string createdAt = 8;
}

message UserList { repeated User users = 1; }